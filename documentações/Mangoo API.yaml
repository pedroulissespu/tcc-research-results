          title: Iniciado em
        finished_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        settings:
          title: Configurações
          description: |-
            Objeto JSON com opções opcionais do jogo. Chaves suportadas:
            - shuffle_answers (bool): embaralhar alternativas (ex: true)
            - time_per_question (int): tempo padrão por questão em segundos (ex: 30)
            - allow_multiple_attempts (bool): permitir múltiplos envios por jogador
            - show_leaderboard_between_questions (bool): mostrar placar entre questões
            - max_players (int): limite máximo de jogadores
            - public (bool): jogo visível publicamente
            - pin_timeout_seconds (int): tempo de expiração do PIN em segundos
            - points_multiplier (float): multiplicador global de pontos (ex: 1.0)
            - theme (str): tema visual, ex: 'light' ou 'dark'
            Exemplo: {"shuffle_answers": true, "time_per_question": 30, "max_players": 100, "points_multiplier": 1.0}
