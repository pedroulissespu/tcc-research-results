          application/json:
            schema:
              $ref: '#/components/schemas/BadgeCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BadgeCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BadgeCreate'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadgeCreate'
          description: ''
  /badges/{id}/:
    get:
      operationId: badges_retrieve
      description: |-
        ViewSet for managing badges.

        Attributes
            serializer_class (type): Serializer class for badges.
            serializer_action_classes (dict): Specific serializers for actions.
            permission_classes (tuple): Required permissions to access the view.
            filter_backends (list): List of filter backends.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este Insígnia.
        required: true
